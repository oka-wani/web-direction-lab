name: Generate daily content drafts

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-content-draft
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate knowledge, news, and short-video drafts
        run: node scripts/generate-daily.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate draft format
        run: node scripts/validate-content.mjs

      - name: Save generated draft
        run: |
          git config user.name "web-direction-lab-bot"
          git config user.email "actions@users.noreply.github.com"
          git add automation/drafts
          if git diff --cached --quiet; then
            echo "No new draft to commit."
          else
            git commit -m "Add daily content draft"
            git push
          fi
