name: Generate and publish daily content

on:
  schedule:
    # 06:00 JST (GitHub Actions cron is UTC)
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-content-draft
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Select today's publication
        id: daily
        shell: bash
        run: |
          RUN_DATE="$(TZ=Asia/Tokyo date +%F)"
          echo "run_date=${RUN_DATE}" >> "$GITHUB_OUTPUT"
          if [ -f "automation/drafts/daily-${RUN_DATE}.json" ]; then
            echo "generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "generate=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate knowledge, news, and column drafts
        if: steps.daily.outputs.generate == 'true'
        run: npm run generate:draft
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RUN_DATE: ${{ steps.daily.outputs.run_date }}

      - name: Validate generated content
        run: npm run content:validate

      - name: Convert drafts to published site content
        run: npm run approve:draft
        env:
          RUN_DATE: ${{ steps.daily.outputs.run_date }}
          APPROVE_KNOWLEDGE: "true"
          APPROVE_NEWS: "true"
          APPROVE_COLUMN: "true"
          APPROVED_BY: web-direction-lab-bot

      - name: Validate published content and site build
        run: |
          npm run content:validate
          npm run build

      - name: Publish to main
        env:
          RUN_DATE: ${{ steps.daily.outputs.run_date }}
        run: |
          git config user.name "web-direction-lab-bot"
          git config user.email "actions@users.noreply.github.com"
          git add automation/drafts automation/approved automation/published content
          if git diff --cached --quiet; then
            echo "Today's content is already published."
            exit 0
          fi
          git commit -m "Publish daily content for ${RUN_DATE}"
          git pull --rebase origin main
          git push origin main
